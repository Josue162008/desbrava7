<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube de desbravadores</title>
    <link rel="stylesheet" href="app.css">
    <link rel="icon" href="public/src/img/f1df3925ac598980d0110515e4639fd7-removebg-preview.png">
    <script src="app.js"></script>
</head>
<body>
    <form class="container-login" action="">
        <img src="public/src/img/f1df3925ac598980d0110515e4639fd7-removebg-preview.png" height="250px">
        <h1>Olá Desbravador(a)!</h1>
        <label for="">Associação</label><input type="text" required id="associacao-procurar"><br>
        <label for="">Região</label><input type="text" required id="regiao-procurar"><br>
        <label for="">Nome do clube</label><input type="text" required id="clube-procurar"><br>
        <button type="submit" onclick="procurar()">Procurar</button>
    </form>

    <button id="dark-mode" onclick="darkMode()">🌙 Dark Mode</button>
</body>
</html>
